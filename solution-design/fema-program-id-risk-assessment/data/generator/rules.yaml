# =============================================================================
# rules.yaml — Wave 1 synthetic-data generator config ("rules-as-data")
# Package: FEMA Program ID & PRA Automation (demo)
# =============================================================================
# EVERYTHING in this file is synthetic demo configuration (SYNTHETIC-DEMO).
# It encodes the PLANTED ground truth the generator uses to build the ledger:
#   - program taxonomy (parent -> sub-grouping -> financial-code segments)
#   - mapping rules (code_to_subprogram / rollup / event_split), per file 09 §2
#   - cleansing / adjustment rules (REQ-003)
#   - the configurable YoY variance trigger, per file 10 §5 (REQ-010, ASSUMP-03)
#     now dual-measure: dollars AND transaction count (REQ-031, 2024 change)
#   - the planted per-FY growth plan that drives the variance scenarios
#
# TAXONOMY (updated 2026-07-11, CH-01/REQ-027): the five parent programs are
# REAL, PUBLIC FEMA program names supplied by the client team after the
# 2026-07-11 feedback meeting (names public; every dollar remains synthetic):
#   - Public Assistance ............. sub-grouped BY DISASTER NUMBER (no named subs)
#   - Hazard Mitigation Grant Program no sub-programs (single direct grouping)
#   - Urban Search & Rescue ......... no sub-programs (single direct grouping);
#                                     modeled NON-disaster (readiness funding —
#                                     synthetic choice, ASSUMP-23/SME-30)
#   - Individual Assistance ......... subs: IHP / Mass Care / Disaster Case Mgmt
#   - Homeland Security Grant Program subs: SHSP / UASI / Operation Stonegarden;
#                                     NON-disaster (preparedness grants, REQ-030)
# Everything below program names — segments, codes, TAFS values, disbursement
# types, dollar amounts, growth plans — is fictional (ASSUMP-20/23; SME-27/30).
# Real public identifiers used as skeleton: DR numbers (SRC-02) and assistance
# listings (SRC-12). The Wave 4 inference crawler must NOT read this file's
# taxonomy; it must rediscover groupings from transaction history alone (REQ-013).
# =============================================================================

seed: 20260708                # single fixed seed; re-runs are byte-identical
watermark: SYNTHETIC-DEMO     # stamped on every output row (ASSUMP-10)

fiscal_years: [2022, 2023, 2024, 2025, 2026]   # >= 4 consecutive FYs (ASSUMP-07)
# NOTE: FY2026 is modeled as a complete fiscal year (dates through 2026-09-30)
# so YoY math is illustratively whole-year. Stated in DATA_DICTIONARY.md.

# --- file 10 §5 structure, extended per REQ-031 (2024 change; SME-28) --------
# The trigger now evaluates BOTH measures; a breach on ANY enabled measure
# flags the program for a comprehensive assessment (ASSUMP-21). Direction
# options retained ("Mike was concerned about the decrease"); the dollar floor
# stays, with an analogous optional count floor.
variance_trigger:
  measures: [disbursements, transaction_count]  # REQ-031; drop to one entry to disable a measure
  combine: any                  # any | all (team's rule reads as either-measure; SME-28)
  measure: disbursements        # legacy single-measure key (template compat until Wave C UI)
  threshold_pct: 20             # transcript hedged "I think it's like 20%" (REQ-010)
  direction: either             # either | increase_only | decrease_only (SME-01)
  min_prior_year_amount: 0      # optional dollar floor to suppress noise on tiny programs
  min_prior_year_count: 0       # optional count floor (SME-28)
  compare: prior_fiscal_year    # YoY basis

# --- file 09 §9 routing (ASSUMP-16; confirm SME-15) --------------------------
confidence_routing:
  prefill_threshold: 0.85       # >= prefill+editable; < exception queue

# --- calibration (SRC-03 / SRC-04 obligation envelopes; ASSUMP-10) -----------
# Applies to DISASTER programs only. Non-disaster programs (HSGP, US&R) have
# no public per-DR envelope; their synthetic bases are fixed below and carry a
# no-public-envelope note in DATA_DICTIONARY.md (never presented as calibrated).
calibration:
  anchors_file: anchors.json    # cached live pull; --refresh-anchors re-pulls
  max_envelope_utilization: 0.90   # cumulative synthetic disbursements per DR
                                   # must stay <= 90% of that DR's obligation envelope

# --- WebFMIS-style field stand-ins (CH-02/03, REQ-028/029; ASSUMP-20/SME-27) --
# TAFS values use clearly-synthetic 98xx main accounts under agency 070 (DHS):
# realistically FORMATTED, deliberately not real Treasury accounts. "X" =
# no-year money (ties to the no-year disaster-fund narrative, REQ-026).
# Disbursement-type values are generic illustrative labels, not FEMA codes.
disbursement_types:
  - {name: "Grant award payment", weight: 0.55}
  - {name: "Vendor / contract payment", weight: 0.20}
  - {name: "Direct assistance payment", weight: 0.15}
  - {name: "Interagency transfer", weight: 0.10}

# --- cleansing / adjustment rules (REQ-002 / REQ-003) ------------------------
# Applied to transaction.raw_code to recover the canonical code. The generator
# plants dirty variants so this step has real work to do in the demo.
cleansing:
  normalize:                    # deterministic normalization pipeline
    - strip_whitespace
    - uppercase
    - separators_to_hyphen      # "PA/97036/4332", "PA 97036 4332" -> "PA-97036-4332"
  alias_map:                    # legacy codes retired after FY2023 (adjustment cases)
    LEG-0001: PA-97036-4332
    LEG-0002: HM-97039-4340
    LEG-0003: IA-61101-4339
    LEG-0004: PA-60101-4340
  dirty_raw_share: 0.06         # ~6% of rows land with a non-canonical raw_code

# --- disaster events (verbatim SRC-02 set; file 08 §5; REQ-005) --------------
disaster_events:
  - {disaster_number: 4332, incident_type: Hurricane Harvey, state: TX, fy_declared: 2017, declaration_title: Harvey/TX}
  - {disaster_number: 4337, incident_type: Hurricane Irma,   state: FL, fy_declared: 2017, declaration_title: Irma/FL}
  - {disaster_number: 4338, incident_type: Hurricane Irma,   state: GA, fy_declared: 2017, declaration_title: Irma/GA}
  - {disaster_number: 4339, incident_type: Hurricane Maria,  state: PR, fy_declared: 2017, declaration_title: Maria/PR}
  - {disaster_number: 4340, incident_type: Hurricane Maria,  state: VI, fy_declared: 2017, declaration_title: Maria/VI}
  - {disaster_number: 4341, incident_type: Hurricane Irma,   state: FL, fy_declared: 2017, declaration_title: Irma - Seminole Tribe}
  - {disaster_number: 4346, incident_type: Hurricane Irma,   state: SC, fy_declared: 2018, declaration_title: Irma follow-on (FY2018)}

# =============================================================================
# PROGRAM TAXONOMY + PLANTED GROWTH PLAN (real public names; synthetic dollars)
# -----------------------------------------------------------------------------
# growth: FY-over-FY multiplier deltas applied to base_annual_disbursement
#   (FY2022 = base). These plant the DOLLAR variance scenarios (REQ-010):
#     FY2026 crossings at threshold 20%, direction either:
#       +20% crossers : PROG-PA (+34%), PROG-HS (+21%)
#       -20% crossers : PROG-HM (-31%)
#       within +/-20% : PROG-IA (+8%), PROG-UR (+19% near-miss)
#     prior-year texture: PROG-IA FY2024 +24%, PROG-HS FY2023 +28%,
#                         PROG-UR FY2025 -22%
# txn_count_plan (optional): plants the TRANSACTION-COUNT dimension (REQ-031).
#   PROG-IA is the count-only breach showcase: FY2026 dollars +8% (inside the
#   corridor) while transaction count jumps 32 -> 44 = +37.5% (breach).
# sub_program mapping styles:
#   event_driven   : the EVENT segment decides the sub-grouping (PA: one
#                    grouping per disaster number; HMGP: single direct grouping)
#   segment_driven : each sub owns program_segment(s); event is free
# Non-disaster programs (is_disaster: false) have no DR events: their codes
# carry the ND event segment and transactions carry no disaster number.
# Small-envelope DRs (4338, 4341, 4346) only ever appear alongside a large DR;
# within a sub, disaster spend splits across its events in proportion to the
# real obligation envelope of each DR, so tiny DRs receive tiny synthetic dollars.
# =============================================================================
programs:

  - program_id: PROG-PA
    program_name: Public Assistance
    assistance_listing: "97.036"
    is_disaster: true
    tafs: "070-X-9801"
    fund_segment: PA
    mapping_style: event_driven
    program_segments: ["97036", "60101", "60102", "60103"]
    base_annual_disbursement: 620000000
    growth: {2023: 0.09, 2024: 0.14, 2025: 0.06, 2026: 0.34}
    scenario: "trigger_up_1; subgrouped_by_disaster_number (REQ-005/taxonomy); multi_event_split"
    sub_programs:                       # PA sub-grouping IS the disaster number
      - {sub_program_id: SUB-PA-4332, sub_program_name: "DR-4332 — Hurricane Harvey (TX)",          events: [4332]}
      - {sub_program_id: SUB-PA-4337, sub_program_name: "DR-4337 — Hurricane Irma (FL)",            events: [4337]}
      - {sub_program_id: SUB-PA-4338, sub_program_name: "DR-4338 — Hurricane Irma (GA)",            events: [4338]}
      - {sub_program_id: SUB-PA-4339, sub_program_name: "DR-4339 — Hurricane Maria (PR)",           events: [4339]}
      - {sub_program_id: SUB-PA-4340, sub_program_name: "DR-4340 — Hurricane Maria (VI)",           events: [4340]}
      - {sub_program_id: SUB-PA-4341, sub_program_name: "DR-4341 — Hurricane Irma (Seminole Tribe)", events: [4341]}
      - {sub_program_id: SUB-PA-4346, sub_program_name: "DR-4346 — Hurricane Irma follow-on (SC)",  events: [4346]}

  - program_id: PROG-HM
    program_name: Hazard Mitigation Grant Program (HMGP)
    assistance_listing: "97.039"
    is_disaster: true
    tafs: "070-X-9802"
    fund_segment: HM
    mapping_style: event_driven
    program_segments: ["97039", "60201"]
    base_annual_disbursement: 210000000
    growth: {2023: 0.12, 2024: -0.06, 2025: 0.09, 2026: -0.31}
    scenario: "trigger_down_1; no_sub_programs (single direct grouping per taxonomy); multi_event_split"
    sub_programs:                       # HMGP has NO sub-programs: one pass-through
      - {sub_program_id: SUB-HM-ALL, sub_program_name: "HMGP — direct (no sub-programs)", events: [4332, 4337, 4339, 4340]}

  - program_id: PROG-IA
    program_name: Individual Assistance
    assistance_listing: ""              # umbrella program; listings live at sub level (SME-30)
    is_disaster: true
    tafs: "070-X-9803"
    fund_segment: IA
    mapping_style: segment_driven
    base_annual_disbursement: 310000000
    growth: {2023: 0.07, 2024: 0.24, 2025: -0.05, 2026: 0.08}
    txn_count_plan: {2022: 24, 2023: 26, 2024: 30, 2025: 32, 2026: 44}
    scenario: "rollup_exactly_3_subs (REQ-004); count_only_trigger FY2026 (REQ-031: dollars +8%, txn count +37.5%); texture_prior_year_crossing (FY2024 +24%)"
    sub_programs:
      - {sub_program_id: SUB-IA-IHP, sub_program_name: "Individuals and Households Program (IHP)", segments: ["61101", "61102"], events: [4339, 4340]}
      - {sub_program_id: SUB-IA-MC,  sub_program_name: "Mass Care",                                segments: ["61103"],          events: [4332, 4337]}
      - {sub_program_id: SUB-IA-DCM, sub_program_name: "Disaster Case Management",                 segments: ["61104", "55501"], events: [4339]}

  - program_id: PROG-HS
    program_name: Homeland Security Grant Program (HSGP)
    assistance_listing: "97.067"
    is_disaster: false                  # preparedness grants — the non-disaster carrier (REQ-030)
    tafs: "070-26/27-9804"
    fund_segment: HS
    mapping_style: segment_driven
    base_annual_disbursement: 260000000
    growth: {2023: 0.28, 2024: 0.05, 2025: 0.11, 2026: 0.21}
    scenario: "trigger_up_2; non_disaster (REQ-030); rollup_exactly_3_subs; texture_prior_year_crossing (FY2023 +28%); shared_segment_55501 (needs fund+segment rule)"
    sub_programs:
      - {sub_program_id: SUB-HS-SHSP, sub_program_name: "State Homeland Security Grant Program (SHSP)", segments: ["97067", "61501"], events: []}
      - {sub_program_id: SUB-HS-UASI, sub_program_name: "Urban Area Security Initiative (UASI)",  segments: ["61502"],          events: []}
      - {sub_program_id: SUB-HS-OPSG, sub_program_name: "Operation Stonegarden",                  segments: ["61503", "55501"], events: []}

  - program_id: PROG-UR
    program_name: Urban Search & Rescue (US&R)
    assistance_listing: "97.025"
    is_disaster: false                  # readiness funding — synthetic choice (ASSUMP-23, SME-30)
    tafs: "070-26/26-9805"
    fund_segment: UR
    mapping_style: segment_driven
    base_annual_disbursement: 38000000
    growth: {2023: 0.04, 2024: 0.08, 2025: -0.22, 2026: 0.19}
    scenario: "near_miss_below_threshold (FY2026 +19%); no_sub_programs (single direct grouping); non_disaster (ASSUMP-23); texture_prior_year_down_crossing (FY2025 -22%)"
    sub_programs:
      - {sub_program_id: SUB-UR-ALL, sub_program_name: "US&R — direct (no sub-programs)", segments: ["97025", "61601"], events: []}

# =============================================================================
# EXCEPTION-QUEUE PLANTS (REQ-003; file 09 §2 — "new code never seen")
# FY2026-only codes with NO mapping rule. The pipeline must route them to the
# exception queue; similarity matching (Wave 4) may SUGGEST the target below
# (suggested_* is the planted truth; confidence < prefill_threshold).
# =============================================================================
exception_codes:
  - {code: XR-88001-4339, fund_segment: XR, program_segment: "88001", event: 4339, suggested_sub_program: SUB-IA-IHP,  suggested_program: PROG-IA, suggested_confidence: 0.58, total_amount: 1800000, txn_count: 4}
  - {code: XR-88002-4340, fund_segment: XR, program_segment: "88002", event: 4340, suggested_sub_program: SUB-PA-4340, suggested_program: PROG-PA, suggested_confidence: 0.52, total_amount: 950000,  txn_count: 3}
  - {code: XR-88003-4339, fund_segment: XR, program_segment: "88003", event: 4339, suggested_sub_program: SUB-HM-ALL,  suggested_program: PROG-HM, suggested_confidence: 0.61, total_amount: 420000,  txn_count: 3}
  - {code: NC-88101-4332, fund_segment: NC, program_segment: "88101", event: 4332, suggested_sub_program: SUB-PA-4332, suggested_program: PROG-PA, suggested_confidence: 0.55, total_amount: 730000,  txn_count: 3}
  - {code: NC-88102-4337, fund_segment: NC, program_segment: "88102", event: 4337, suggested_sub_program: SUB-IA-MC,   suggested_program: PROG-IA, suggested_confidence: 0.49, total_amount: 260000,  txn_count: 2}
  - {code: NC-88103-4346, fund_segment: NC, program_segment: "88103", event: 4346, suggested_sub_program: SUB-PA-4346, suggested_program: PROG-PA, suggested_confidence: 0.44, total_amount: 180000,  txn_count: 2}
