# =============================================================================
# rules.yaml — Wave 1 synthetic-data generator config ("rules-as-data")
# Package: FEMA Program ID & PRA Automation (demo)
# =============================================================================
# EVERYTHING in this file is synthetic demo configuration (SYNTHETIC-DEMO).
# It encodes the PLANTED ground truth the generator uses to build the ledger:
#   - program taxonomy (parent -> sub-program -> financial-code segments)
#   - mapping rules (code_to_subprogram / rollup / event_split), per file 09 §2
#   - cleansing / adjustment rules (REQ-003)
#   - the configurable YoY variance trigger, per file 10 §5 (REQ-010, ASSUMP-03)
#   - the planted per-FY growth plan that drives the variance scenarios
# Real public identifiers used as skeleton: DR numbers (SRC-02) and assistance
# listings 97.036 / 97.039 (SRC-03/04/12). Everything else is fictional.
# The Wave 4 inference crawler must NOT read this file's taxonomy; it must
# rediscover groupings from the transaction history alone (REQ-013).
# =============================================================================

seed: 20260708                # single fixed seed; re-runs are byte-identical
watermark: SYNTHETIC-DEMO     # stamped on every output row (ASSUMP-10)

fiscal_years: [2022, 2023, 2024, 2025, 2026]   # >= 4 consecutive FYs (ASSUMP-07)
# NOTE: FY2026 is modeled as a complete fiscal year (dates through 2026-09-30)
# so YoY math is illustratively whole-year. Stated in DATA_DICTIONARY.md.

# --- file 10 §5, verbatim structure (REQ-010, ASSUMP-03; confirm SME-01) -----
variance_trigger:
  measure: disbursements        # ASSUMP-05; alt: obligations | outlays (SME-01)
  threshold_pct: 20             # transcript hedged "I think it's like 20%" (REQ-010)
  direction: either             # either | increase_only | decrease_only (SME-01)
  min_prior_year_amount: 0      # optional floor to suppress noise on tiny programs
  compare: prior_fiscal_year    # YoY basis

# --- file 09 §9 routing (ASSUMP-16; confirm SME-15) --------------------------
confidence_routing:
  prefill_threshold: 0.85       # >= prefill+editable; < exception queue

# --- calibration (SRC-03 / SRC-04 obligation envelopes; ASSUMP-10) -----------
calibration:
  anchors_file: anchors.json    # cached live pull; --refresh-anchors re-pulls
  max_envelope_utilization: 0.90   # cumulative synthetic disbursements per DR
                                   # must stay <= 90% of that DR's obligation envelope

# --- cleansing / adjustment rules (REQ-002 / REQ-003) ------------------------
# Applied to transaction.raw_code to recover the canonical code. The generator
# plants dirty variants so this step has real work to do in the demo.
cleansing:
  normalize:                    # deterministic normalization pipeline
    - strip_whitespace
    - uppercase
    - separators_to_hyphen      # "PA/97036/4332", "PA 97036 4332" -> "PA-97036-4332"
  alias_map:                    # legacy codes retired after FY2023 (adjustment cases)
    LEG-0001: PA-97036-4332
    LEG-0002: HM-97039-4340
    LEG-0003: DB-61401-4339
    LEG-0004: LG-62201-4340
  dirty_raw_share: 0.06         # ~6% of rows land with a non-canonical raw_code

# --- disaster events (verbatim SRC-02 set; file 08 §5; REQ-005) --------------
disaster_events:
  - {disaster_number: 4332, incident_type: Hurricane Harvey, state: TX, fy_declared: 2017, declaration_title: Harvey/TX}
  - {disaster_number: 4337, incident_type: Hurricane Irma,   state: FL, fy_declared: 2017, declaration_title: Irma/FL}
  - {disaster_number: 4338, incident_type: Hurricane Irma,   state: GA, fy_declared: 2017, declaration_title: Irma/GA}
  - {disaster_number: 4339, incident_type: Hurricane Maria,  state: PR, fy_declared: 2017, declaration_title: Maria/PR}
  - {disaster_number: 4340, incident_type: Hurricane Maria,  state: VI, fy_declared: 2017, declaration_title: Maria/VI}
  - {disaster_number: 4341, incident_type: Hurricane Irma,   state: FL, fy_declared: 2017, declaration_title: Irma - Seminole Tribe}
  - {disaster_number: 4346, incident_type: Hurricane Irma,   state: SC, fy_declared: 2018, declaration_title: Irma follow-on (FY2018)}

# =============================================================================
# PROGRAM TAXONOMY + PLANTED GROWTH PLAN
# -----------------------------------------------------------------------------
# growth: FY-over-FY multiplier deltas applied to base_annual_disbursement
