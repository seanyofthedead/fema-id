#     FY2026 crossings at threshold 20%, direction either:
#       +20% crossers : PROG-PA (+34%), PROG-S03 (+52%), PROG-S09 (+21%)
#       -20% crossers : PROG-HM (-31%), PROG-S12 (-24%)
#       within +/-20% : PROG-S01 (+7%), PROG-S02 (-11%), PROG-S06 (+3%),
#                       PROG-S07 (+19% near-miss), PROG-S10 (-6%), others
# sub_program mapping styles:
#   event_driven   : one program_segment; the EVENT segment decides the sub
#                    (mirrors file 08 §6: PA-97036-4332 -> SUB-PA-A, etc.)
#   segment_driven : each sub owns program_segment(s); event is free
# Small-envelope DRs (4338, 4341, 4346) only ever appear alongside a large DR;
# within a sub, spend splits across its events in proportion to the real
# obligation envelope of each DR, so tiny DRs receive tiny synthetic dollars.
# =============================================================================
